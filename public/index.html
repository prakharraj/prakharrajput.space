<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prakhar Rajput</title>
  <meta name="description" content="Senior Backend Engineer. Building the future of fintech." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050508;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --cyan: #00cec9;
      --text: #f1f1f1;
      --text-dim: #666;
      --glow: rgba(108, 92, 231, 0.4);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    .cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--accent-light);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease, opacity 0.2s;
      box-shadow: 0 0 12px var(--accent-light);
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(162, 155, 254, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
    }

    .cursor-ring.hover {
      width: 52px;
      height: 52px;
      border-color: var(--cyan);
    }

    .cursor-dot.hover {
      transform: translate(-50%, -50%) scale(1.8);
      background: var(--cyan);
      box-shadow: 0 0 20px var(--cyan);
    }

    a, .btn { cursor: none; }

    /* ── Animated grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108, 92, 231, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 92, 231, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(108, 92, 231, 0.25), transparent 70%);
      top: -10%;
      left: -5%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(0, 206, 201, 0.15), transparent 70%);
      bottom: -10%;
      right: -5%;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(162, 155, 254, 0.12), transparent 70%);
      top: 50%;
      left: 60%;
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -15px) scale(1.05); }
      66% { transform: translate(-10px, 10px) scale(0.95); }
    }

    /* ── Particle canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Main content ── */
    .wrapper {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* ── Terminal-style badge ── */
    .terminal-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      background: rgba(0, 206, 201, 0.06);
      border: 1px solid rgba(0, 206, 201, 0.2);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.2s forwards;
    }

    .terminal-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Name ── */
    .hero-name {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
      background: linear-gradient(135deg, #fff 0%, var(--accent-light) 50%, var(--cyan) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s ease 0.4s forwards, gradientShift 6s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ── Subtitle ── */
    .hero-subtitle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    .hero-subtitle strong {
      color: var(--text);
      font-weight: 500;
    }

    .hero-tagline {
      font-size: 0.95rem;
      color: var(--text-dim);
      max-width: 500px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.75s forwards;
    }

    /* ── CTA Buttons ── */
    .cta-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.9s forwards;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      box-shadow: 0 4px 24px var(--glow), 0 0 0 1px rgba(108, 92, 231, 0.3);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px var(--glow), 0 0 0 1px rgba(108, 92, 231, 0.5);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── Bottom links ── */
    .bottom-links {
      position: absolute;
      bottom: 2rem;
      display: flex;
      gap: 1.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
    }

    .bottom-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .bottom-links a:hover {
      color: var(--text);
    }

    .bottom-links a svg {
      width: 14px;
      height: 14px;
    }

    /* ── Scanline effect ── */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
      opacity: 0.3;
      animation: scanDown 4s linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes scanDown {
      0% { top: -2px; }
      100% { top: 100%; }
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .wrapper { padding: 1.5rem; }
      .cta-group { flex-direction: column; align-items: center; }
      .bottom-links { gap: 1rem; }
    }
  </style>
</head>
<body>

  <script>
    // Particle system
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 1;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.7 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (mouse.x !== null) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            const force = (180 - dist) / 180;
            this.speedX -= (dx / dist) * force * 0.15;
            this.speedY -= (dy / dist) * force * 0.15;
          }
        }

        this.speedX *= 0.96;
        this.speedY *= 0.96;

        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(162, 155, 254, ${this.opacity})`;
        ctx.fill();
      }
    }

    const count = Math.min(200, Math.floor((canvas.width * canvas.height) / 5000));
    for (let i = 0; i < count; i++) {
      particles.push(new Particle());
    }

    function connectParticles() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(108, 92, 231, ${0.12 * (1 - dist / 180)})`;
            ctx.lineWidth = 0.7;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      connectParticles();
      requestAnimationFrame(animate);
    }
    animate();

    // Custom cursor
    const dot = document.querySelector('.cursor-dot');
    const ring = document.querySelector('.cursor-ring');
    let ringX = 0, ringY = 0, dotX = 0, dotY = 0;

    document.addEventListener('mousemove', (e) => {
      dotX = e.clientX;
      dotY = e.clientY;
      dot.style.left = dotX + 'px';
      dot.style.top = dotY + 'px';
    });

    function animateRing() {
      ringX += (dotX - ringX) * 0.15;
      ringY += (dotY - ringY) * 0.15;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    document.querySelectorAll('a, .btn').forEach(el => {
      el.addEventListener('mouseenter', () => {
        dot.classList.add('hover');
        ring.classList.add('hover');
      });
      el.addEventListener('mouseleave', () => {
        dot.classList.remove('hover');
        ring.classList.remove('hover');
      });
    });
  </script>
